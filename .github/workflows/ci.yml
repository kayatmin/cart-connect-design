name: Design workflow CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: design-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  design:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build design prompts
        run: npm run prompt:build

      - name: Validate shell scripts
        run: bash -n scripts/*.sh
