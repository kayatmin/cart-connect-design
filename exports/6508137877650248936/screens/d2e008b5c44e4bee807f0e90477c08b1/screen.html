    body {

<body class="bg-bg-base text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-4 h-14 w-full z-50 sticky top-0 bg-[#FFFFFF] text-[#102033] border-b border-slate-200">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#102033] active:opacity-80 transition-all">menu</button>
<h1 class="text-lg font-extrabold tracking-tighter text-[#102033] uppercase font-['Plus_Jakarta_SANS']">CartConnect</h1>
</div>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-muted flex items-center justify-center">
<span class="material-symbols-outlined text-sm">notifications</span>
</div>
</div>
</header>
<!-- Main Content: Empty State Area -->
<main class="flex-1 flex flex-col items-center justify-center px-page-margin mb-32">
<!-- Status Indicator Rail (Industrial Discipline) -->
<div class="w-full max-w-sm bg-surface-white rounded-xl border border-border-soft overflow-hidden relative">
<!-- Tonal Layering & Grid Discipline -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-container-success-text"></div>
<div class="p-10 flex flex-col items-center text-center">
<!-- Calm Visual Icon -->
<div class="w-20 h-20 bg-container-success-bg rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-container-success-text text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Headline -->
<h2 class="font-display text-display text-text-primary mb-3">All Clear</h2>
<!-- Subtext -->
<p class="font-body text-body text-text-secondary max-w-[240px]">
                    No waiting sessions at the moment. Your station is ready for traffic.
                </p>
<!-- Operations Console Decorative Data -->
<div class="mt-10 pt-6 border-t border-surface-muted w-full flex justify-around">
<div class="flex flex-col gap-1">
<span class="font-metadata text-metadata text-text-tertiary uppercase tracking-wider">Status</span>
<span class="font-data-tabular text-data-tabular text-container-success-text uppercase">Operational</span>
</div>
<div class="flex flex-col gap-1">
<span class="font-metadata text-metadata text-text-tertiary uppercase tracking-wider">Queue</span>
<span class="font-data-tabular text-data-tabular text-text-primary">0 Active</span>
</div>
</div>
</div>
</div>
<!-- Secondary Visual Detail (Optional Contextual Layer) -->
<div class="mt-10 flex items-center gap-3 px-4 py-2 bg-surface-muted rounded-full border border-border-soft">
<span class="w-2 h-2 rounded-full bg-success-green animate-pulse"></span>
<span class="font-metadata text-metadata text-text-secondary uppercase">Live Feed Synchronized</span>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-[#FBFCFE] border-t border-slate-200">
<!-- Sessions (Active) -->
<a class="flex flex-col items-center justify-center text-[#102033] bg-slate-100 rounded-lg py-1 px-3 active:scale-95 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="forum" style="font-variation-settings: 'FILL' 1;">forum</span>
<span class="font-['Plus_Jakarta_SANS'] text-[11px] font-medium uppercase tracking-wider mt-1">Sessions</span>
</a>
<!-- Inventory -->
<a class="flex flex-col items-center justify-center text-slate-500 py-1 px-3 active:scale-95 transition-transform duration-200 hover:text-[#102033]" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-['Plus_Jakarta_SANS'] text-[11px] font-medium uppercase tracking-wider mt-1">Inventory</span>
</a>
<!-- Stats -->
<a class="flex flex-col items-center justify-center text-slate-500 py-1 px-3 active:scale-95 transition-transform duration-200 hover:text-[#102033]" href="#">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
<span class="font-['Plus_Jakarta_SANS'] text-[11px] font-medium uppercase tracking-wider mt-1">Stats</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-slate-500 py-1 px-3 active:scale-95 transition-transform duration-200 hover:text-[#102033]" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Plus_Jakarta_SANS'] text-[11px] font-medium uppercase tracking-wider mt-1">Profile</span>
</a>
</nav>
