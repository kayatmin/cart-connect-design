<header class="bg-slate-50 dark:bg-slate-950 flex items-center justify-between px-4 h-16 w-full border-b border-slate-200 dark:border-slate-800 fixed top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50" data-icon="shield_person">shield_person</span>
<span class="text-xl font-bold tracking-tighter text-slate-900 dark:text-slate-50 font-['Plus_Jakarta_Sans']">CartConnect</span>
</div>
<div class="flex items-center">
<div class="w-2 h-2 rounded-full bg-clear-green mr-2"></div>
<span class="font-technical text-[10px] text-slate-500 uppercase tracking-widest">System Ready</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-edge-margin pt-16 pb-12">
<!-- Brand Identity Section -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-ink-primary text-on-primary mb-4 shadow-sm">
<span class="material-symbols-outlined text-3xl" data-icon="shopping_cart">shopping_cart</span>
</div>
<h1 class="font-display-lg text-display-lg text-ink-primary tracking-tight">Agent Console</h1>
<p class="font-body-sm text-text-secondary mt-1">Authorized access only for retail partners</p>
</div>
<!-- Login Form Card -->
<div class="w-full max-w-sm bg-surface-main p-6 rounded-xl border border-border-soft shadow-sm">
<form class="space-y-5">
<div class="space-y-2">
<label class="font-['Source_Sans_3'] text-xs font-semibold uppercase tracking-wider text-text-tertiary" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg bg-surface-raised border border-border-soft focus:border-active-blue focus:ring-1 focus:ring-active-blue transition-all outline-none font-body-md text-text-primary placeholder:text-text-tertiary" id="email" name="email" placeholder="agent@cartconnect.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-['Source_Sans_3'] text-xs font-semibold uppercase tracking-wider text-text-tertiary" for="password">Password</label>
<a class="font-body-sm text-active-blue hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg bg-surface-raised border border-border-soft focus:border-active-blue focus:ring-1 focus:ring-active-blue transition-all outline-none font-body-md text-text-primary placeholder:text-text-tertiary" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full h-[52px] bg-ink-primary text-on-primary font-['Source_Sans_3'] font-semibold rounded-lg hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl" data-icon="login">login</span>
</button>
</div>
<div class="relative py-2">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-soft"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-surface-main px-2 text-xs font-technical text-text-tertiary uppercase">SSO Authentication</span>
</div>
</div>
<button class="w-full h-12 border border-border-soft bg-surface-main text-ink-primary font-['Source_Sans_3'] font-semibold rounded-lg hover:bg-slate-50 transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-xl" data-icon="key">key</span>
<span>Corporate SSO</span>
</button>
</form>
</div>
<!-- Visual Anchor (Asymmetric/Premium Detail) -->
<div class="mt-8 grid grid-cols-2 gap-4 w-full max-w-sm">
<div class="h-24 rounded-xl border border-border-soft bg-surface-main flex flex-col items-center justify-center p-3">
<span class="material-symbols-outlined text-active-blue mb-1" data-icon="bolt">bolt</span>
<span class="font-technical text-[10px] text-text-tertiary uppercase text-center">Low Latency<br/>Protocol</span>
</div>
<div class="h-24 rounded-xl border border-border-soft bg-surface-main flex flex-col items-center justify-center p-3">
<span class="material-symbols-outlined text-clear-green mb-1" data-icon="verified_user">verified_user</span>

<div class="w-1 h-1 rounded-full bg-slate-300"></div>
